<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
``

<title>Operation: Vital Code</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    height: 100vh;
    overflow: hidden;
}

/* YLÄTEKSTI */
.top-title {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 4px;
    color: #00ff88;
    z-index: 2;
}

/* MATRIX CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* UI */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;

    padding: 40px;
    width: 420px;
    border: 1px solid #00ff88;
    background: rgba(0, 0, 0, 0.85);
    box-shadow: 0 0 25px rgba(0,255,136,0.5);
}

.subtitle {
    font-size: 13px;
    margin: 15px 0;
    opacity: 0.7;
}

input[type="text"] {
    width: 100%;
    padding: 10px;
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    font-family: inherit;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #00ff88;
    border: none;
    color: black;
    cursor: pointer;
}

button:hover {
    background: #00cc6e;
}

.status {
    margin-top: 20px;
    font-size: 13px;
}

.error {
    color: #ff4d4d;
}

.success {
    color: #00ff88;
}

/* GLITCH */
.glitch {
    animation: glitch 0.2s 3;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-1px, 1px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div class="top-title">OPERATION: VITAL CODE</div>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="subtitle">Encrypted channel active</div>

    <form onsubmit="return checkCode(event)">
        <input id="codeInput" type="text" placeholder="Syötä avainlause..." required>
        <button type="submit">VERIFY</button>
    </form>

    <div id="status" class="status"></div>
</div>

<script>
/* MATRIX RAIN */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff88";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);

/* DECRYPT EFFECT */
function decryptEffect(finalText, element, callback) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let iterations = 0;

    const interval = setInterval(() => {
        element.innerText = finalText
            .split("")
            .map((letter, index) => {
                if (index < iterations) return finalText[index];
                return chars[Math.floor(Math.random() * chars.length)];
            })
            .join("");

        if (iterations >= finalText.length) {
            clearInterval(interval);
            if (callback) callback();
        }

        iterations += 0.5;
    }, 30);
}

/* FAIL ANIMATION */
function failEffect(status, input) {
    status.classList.add("glitch");
    input.classList.add("glitch");

    status.innerText = "ACCESS DENIED";
    status.className = "status error";

    setTimeout(() => {
        status.classList.remove("glitch");
        input.classList.remove("glitch");
    }, 600);
}

/* CHECK CODE */
function checkCode(event) {
    event.preventDefault();

    const input = document.getElementById("codeInput");
    const status = document.getElementById("status");

    const correct = "yliopistopalveluissa työn arvo syntyy yhteistyöstä";

    status.innerText = "VERIFYING...";
    status.className = "status";

    setTimeout(() => {
        if (input.value.trim().toLowerCase() === correct) {

            status.className = "status success";

            decryptEffect("ACCESS GRANTED", status, () => {
                setTimeout(() => {
                    window.location.href = "secret.html";
                }, 800);
            });

        } else {
            failEffect(status, input);
        }
    }, 700);

    return false;
}

/* RESPONSIVE */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
