<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">

<!-- ✅ TÄRKEIN: mobiilisäätö -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operation: Vital Code</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    height: 100vh;
    overflow: hidden;
}

/* YLÄTEKSTI */
.top-title {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 3px;
    color: #00ff88;
    z-index: 2;
}

/* MATRIX CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* BOX */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;

    width: 90%;
    max-width: 420px;

    padding: 25px;
    border: 1px solid #00ff88;
    background: rgba(0, 0, 0, 0.85);
    box-shadow: 0 0 20px rgba(0,255,136,0.5);
}

/* TEKSTIT */
.subtitle {
    font-size: 15px;
    margin: 15px 0;
    opacity: 0.8;
    text-align: center;
}

/* INPUT */
input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
}

/* BUTTON */
button {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #00ff88;
    border: none;
    color: black;
    cursor: pointer;
}

button:hover {
    background: #00cc6e;
}

/* STATUS */
.status {
    margin-top: 20px;
    font-size: 16px;
    text-align: center;
}

.success {
    color: #00ff88;
}

.error {
    color: #ff4d4d;
}

/* GLITCH */
.glitch {
    animation: glitch 0.2s 3;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-1px, 1px); }
    100% { transform: translate(0); }
}

/* 📱 EXTRA MOBIILI */
@media (max-width: 480px) {
    .top-title {
        font-size: 12px;
    }

    .subtitle {
        font-size: 14px;
    }

    button, input[type="text"] {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="top-title">OPERATION: VITAL CODE</div>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="subtitle">Encrypted channel active</div>

    <form onsubmit="return checkCode(event)">
        <input id="codeInput" type="text" placeholder="Syötä avainlause..." required>
        <button type="submit">VERIFY</button>
    </form>

    <div id="status" class="status"></div>
</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];

for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff88";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);

/* DECRYPT */
function decryptEffect(text, el, cb) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let i = 0;

    const interval = setInterval(() => {
        el.innerText = text
            .split("")
            .map((letter, index) => {
                if (index < i) return text[index];
                return chars[Math.floor(Math.random() * chars.length)];
            })
            .join("");

        if (i >= text.length) {
            clearInterval(interval);
            if (cb) cb();
        }

        i += 0.5;
    }, 30);
}

/* CHECK */
function checkCode(event) {
    event.preventDefault();

    const input = document.getElementById("codeInput");
    const status = document.getElementById("status");

    const correct = "työn arvo syntyy yhteistyöstä";

    status.innerText = "VERIFYING...";

    setTimeout(() => {
        if (input.value.trim().toLowerCase() === correct) {

            status.className = "status success";

            decryptEffect("ACCESS GRANTED", status, () => {
                setTimeout(() => {
                    window.location.href = "secret.html";
                }, 800);
            });

        } else {
            status.className = "status error glitch";
            status.innerText = "ACCESS DENIED";

            input.classList.add("glitch");

            setTimeout(() => {
                status.className = "status error";
                input.classList.remove("glitch");
            }, 600);
        }
    }, 600);

    return false;
}

/* RESIZE */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
